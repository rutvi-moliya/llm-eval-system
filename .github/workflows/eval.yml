name: LLM Regression Detection Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Allow manual triggers from GitHub UI

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

  evaluate:
    name: Run Evaluation Pipeline
    runs-on: ubuntu-latest
    needs: test  # Only run if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate golden dataset
        run: python scripts/validate_dataset.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Run evaluation pipeline
        run: python src/main.py
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          VECTOR_DB_DIR: agri_db
          EMBEDDINGS_MODEL: models/gemini-embedding-001
          LLM_MODEL: gemini-2.5-flash
          NUM_RETRIEVED_DOCS: "6"
          TEMPERATURE: "0.0"
          WARN_THRESHOLD: "0.03"
          FAIL_THRESHOLD: "0.08"

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()  # Upload report even if pipeline fails
        with:
          name: eval-report-${{ github.run_id }}
          path: reports/
          retention-days: 30